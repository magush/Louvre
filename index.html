<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croquis — Musée du Louvre</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --cream: #f5f0e8;
    --parchment: #e8dfc8;
    --gold: #b8922a;
    --gold-light: #d4aa4a;
    --dark: #1a1612;
    --brown: #4a3728;
  }
  body {
    background: var(--cream);
    font-family: 'Montserrat', sans-serif;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 14px 52px;
  }
  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brown);
  }
  header p {
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 5px;
  }

  .map-container { width: 100%; max-width: 780px; }

  /* SVG wrapper */
  .map-svg-wrap {
    background: var(--parchment);
    border: 2px solid var(--brown);
    border-radius: 6px;
    padding: 16px;
    box-shadow: 3px 5px 22px rgba(74,55,40,0.15);
  }

  svg { display: block; width: 100%; height: auto; }

  /* Pins */
  .pin { cursor: pointer; }
  .pin circle.bg { transition: r 0.15s; }
  .pin:hover circle.bg { r: 13; }
  .pin.active circle.ring { stroke-width: 3; }

  /* Info panel */
  .info-panel {
    margin-top: 18px;
    background: white;
    border: 1px solid var(--parchment);
    border-radius: 4px;
    padding: 18px 22px;
    min-height: 86px;
    box-shadow: 2px 3px 12px rgba(74,55,40,0.08);
    opacity: 0;
    transition: opacity 0.28s;
  }
  .info-panel.vis { opacity: 1; }
  .info-panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.35rem;
    color: var(--dark);
    margin-bottom: 3px;
  }
  .info-meta {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 9px;
  }
  .info-desc {
    font-size: 0.76rem;
    line-height: 1.72;
    color: var(--brown);
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    justify-content: center;
    margin-top: 16px;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--brown);
  }
  .leg span {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .map-svg-wrap { padding: 10px; }
    .info-panel { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Musée du Louvre</h1>
  <p>Plano de obras maestras · Ruta sugerida</p>
</header>

<div class="map-container">
  <div class="map-svg-wrap">
    <svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Marco exterior -->
      <rect x="30" y="20" width="620" height="460" rx="6" fill="none" stroke="rgba(74,55,40,0.2)" stroke-width="0.5"/>

      <!-- Cour Napoléon -->
      <rect x="240" y="170" width="200" height="160" rx="4" fill="rgba(74,55,40,0.06)" stroke="rgba(74,55,40,0.25)" stroke-width="0.5"/>
      <polygon points="340,192 318,228 362,228" fill="none" stroke="rgba(74,55,40,0.35)" stroke-width="1"/>
      <text font-family="Montserrat,sans-serif" font-size="10" fill="rgba(74,55,40,0.45)" text-anchor="middle" x="340" y="248">Cour Napoléon</text>
      <text font-family="Montserrat,sans-serif" font-size="9" fill="rgba(74,55,40,0.35)" text-anchor="middle" x="340" y="261">▲ Pirámide</text>

      <!-- ALA DENON -->
      <rect x="50" y="40" width="160" height="420" rx="6" fill="rgba(232,223,200,0.6)" stroke="rgba(74,55,40,0.35)" stroke-width="1"/>
      <text font-family="Montserrat,sans-serif" font-size="9.5" fill="rgba(74,55,40,0.55)" letter-spacing="2" text-anchor="middle" x="130" y="56">Ala Denon</text>

      <!-- ALA RICHELIEU -->
      <rect x="240" y="40" width="200" height="110" rx="6" fill="rgba(232,223,200,0.6)" stroke="rgba(74,55,40,0.35)" stroke-width="1"/>
      <text font-family="Montserrat,sans-serif" font-size="9.5" fill="rgba(74,55,40,0.55)" letter-spacing="2" text-anchor="middle" x="340" y="56">Ala Richelieu</text>

      <!-- ALA SULLY -->
      <rect x="470" y="40" width="160" height="420" rx="6" fill="rgba(232,223,200,0.6)" stroke="rgba(74,55,40,0.35)" stroke-width="1"/>
      <text font-family="Montserrat,sans-serif" font-size="9.5" fill="rgba(74,55,40,0.55)" letter-spacing="2" text-anchor="middle" x="550" y="56">Ala Sully</text>

      <!-- RUTA (línea dorada punteada) -->
      <!-- Entrada → Victoria -->
      <path d="M340 325 L340 310 L210 310 L210 255" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Victoria → Gioconda -->
      <path d="M210 205 L210 180 L130 180 L130 205" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Gioconda → Bodas de Caná -->
      <path d="M130 255 L130 278" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Bodas → Balsa -->
      <path d="M130 308 L130 348" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Balsa → Libertad -->
      <path d="M112 380 L98 380 L98 398" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Libertad → Venus de Milo -->
      <path d="M90 418 L90 440 L550 440 L550 418" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Venus → Escriba -->
      <path d="M550 372 L550 340" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Escriba → Esclavos -->
      <path d="M535 290 L470 290 L400 290 L400 130 L368 130 L368 110" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>
      <!-- Esclavos → Encajera -->
      <path d="M310 100 L292 100" fill="none" stroke="#b8922a" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrow)" opacity="0.65"/>

      <!-- ===== PINES ===== -->

      <!-- 0: Entrada -->
      <g class="pin" id="p0" onclick="activar(0)">
        <circle class="bg" cx="340" cy="330" r="12" fill="white" stroke="rgba(74,55,40,0.3)" stroke-width="1.5"/>
        <circle class="ring" cx="340" cy="330" r="12" fill="none" stroke="#888780" stroke-width="1.5"/>
        <circle cx="340" cy="330" r="4" fill="#888780"/>
        <text font-family="Montserrat,sans-serif" font-size="9" fill="rgba(74,55,40,0.6)" text-anchor="middle" x="340" y="349">Entrada</text>
      </g>

      <!-- 1: Victoria de Samotracia -->
      <g class="pin" id="p1" onclick="activar(1)">
        <circle class="bg" cx="210" cy="230" r="12" fill="white" stroke="#1D9E75" stroke-width="1.5"/>
        <circle class="ring" cx="210" cy="230" r="12" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#1D9E75" text-anchor="middle" dominant-baseline="central" x="210" y="230">1</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="end" dominant-baseline="central" x="193" y="230">S.703</text>
      </g>

      <!-- 2: Gioconda -->
      <g class="pin" id="p2" onclick="activar(2)">
        <circle class="bg" cx="130" cy="230" r="12" fill="white" stroke="#7b4a8c" stroke-width="1.5"/>
        <circle class="ring" cx="130" cy="230" r="12" fill="none" stroke="#7b4a8c" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#7b4a8c" text-anchor="middle" dominant-baseline="central" x="130" y="230">2</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="end" dominant-baseline="central" x="112" y="230">S.711</text>
      </g>

      <!-- 3: Bodas de Caná -->
      <g class="pin" id="p3" onclick="activar(3)">
        <circle class="bg" cx="130" cy="293" r="12" fill="white" stroke="#7b4a8c" stroke-width="1.5"/>
        <circle class="ring" cx="130" cy="293" r="12" fill="none" stroke="#7b4a8c" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#7b4a8c" text-anchor="middle" dominant-baseline="central" x="130" y="293">3</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="end" dominant-baseline="central" x="112" y="293">S.711</text>
      </g>

      <!-- 4: Balsa de la Medusa -->
      <g class="pin" id="p4" onclick="activar(4)">
        <circle class="bg" cx="130" cy="363" r="12" fill="white" stroke="#b0431a" stroke-width="1.5"/>
        <circle class="ring" cx="130" cy="363" r="12" fill="none" stroke="#b0431a" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#b0431a" text-anchor="middle" dominant-baseline="central" x="130" y="363">4</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="end" dominant-baseline="central" x="112" y="363">S.700</text>
      </g>

      <!-- 5: Libertad guiando -->
      <g class="pin" id="p5" onclick="activar(5)">
        <circle class="bg" cx="90" cy="410" r="12" fill="white" stroke="#b0431a" stroke-width="1.5"/>
        <circle class="ring" cx="90" cy="410" r="12" fill="none" stroke="#b0431a" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#b0431a" text-anchor="middle" dominant-baseline="central" x="90" y="410">5</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="start" dominant-baseline="central" x="108" y="410">S.700</text>
      </g>

      <!-- 6: Venus de Milo -->
      <g class="pin" id="p6" onclick="activar(6)">
        <circle class="bg" cx="550" cy="395" r="12" fill="white" stroke="#1D9E75" stroke-width="1.5"/>
        <circle class="ring" cx="550" cy="395" r="12" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#1D9E75" text-anchor="middle" dominant-baseline="central" x="550" y="395">6</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="start" dominant-baseline="central" x="568" y="395">S.345</text>
      </g>

      <!-- 7: Escriba sentado -->
      <g class="pin" id="p7" onclick="activar(7)">
        <circle class="bg" cx="550" cy="315" r="12" fill="white" stroke="#BA7517" stroke-width="1.5"/>
        <circle class="ring" cx="550" cy="315" r="12" fill="none" stroke="#BA7517" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#BA7517" text-anchor="middle" dominant-baseline="central" x="550" y="315">7</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="start" dominant-baseline="central" x="568" y="315">P.0</text>
      </g>

      <!-- 8: Esclavos Miguel Ángel -->
      <g class="pin" id="p8" onclick="activar(8)">
        <circle class="bg" cx="348" cy="100" r="12" fill="white" stroke="#378ADD" stroke-width="1.5"/>
        <circle class="ring" cx="348" cy="100" r="12" fill="none" stroke="#378ADD" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#378ADD" text-anchor="middle" dominant-baseline="central" x="348" y="100">8</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="start" dominant-baseline="central" x="366" y="100">Richelieu</text>
      </g>

      <!-- 9: Encajera Vermeer -->
      <g class="pin" id="p9" onclick="activar(9)">
        <circle class="bg" cx="278" cy="100" r="12" fill="white" stroke="#378ADD" stroke-width="1.5"/>
        <circle class="ring" cx="278" cy="100" r="12" fill="none" stroke="#378ADD" stroke-width="1.5"/>
        <text font-family="Montserrat,sans-serif" font-size="11" font-weight="500" fill="#378ADD" text-anchor="middle" dominant-baseline="central" x="278" y="100">9</text>
        <text font-family="Montserrat,sans-serif" font-size="8.5" fill="rgba(74,55,40,0.55)" text-anchor="end" dominant-baseline="central" x="260" y="100">S.837</text>
      </g>

      <!-- Brújula -->
      <text font-family="Montserrat,sans-serif" font-size="13" fill="rgba(184,146,42,0.5)" text-anchor="middle" x="650" y="460">N</text>
      <line x1="650" y1="443" x2="650" y2="435" stroke="rgba(184,146,42,0.4)" stroke-width="1"/>
      <line x1="650" y1="468" x2="650" y2="476" stroke="rgba(184,146,42,0.4)" stroke-width="1"/>
      <line x1="633" y1="453" x2="625" y2="453" stroke="rgba(184,146,42,0.4)" stroke-width="1"/>
      <line x1="657" y1="453" x2="665" y2="453" stroke="rgba(184,146,42,0.4)" stroke-width="1"/>
    </svg>
  </div>

  <!-- Leyenda -->
  <div class="legend">
    <div class="leg"><span style="background:#7b4a8c"></span>Renacimiento italiano</div>
    <div class="leg"><span style="background:#1D9E75"></span>Escultura griega</div>
    <div class="leg"><span style="background:#b0431a"></span>Romanticismo francés</div>
    <div class="leg"><span style="background:#BA7517"></span>Antigüedades egipcias</div>
    <div class="leg"><span style="background:#378ADD"></span>Escultura europea</div>
    <div class="leg"><span style="background:#888780"></span>Entrada / ruta</div>
  </div>

  <!-- Panel de info -->
  <div class="info-panel" id="infoPanel">
    <h2 id="iObra"></h2>
    <div class="info-meta" id="iMeta"></div>
    <p class="info-desc" id="iDesc"></p>
  </div>
</div>

<script>
  const obras = [
    {
      obra: "Entrada · Pirámide de cristal",
      meta: "I.M. Pei · 1989 · Hall Napoléon",
      desc: "Empieza aquí. La ruta sugerida baja al Hall Napoléon y entra por el Ala Denon, la más densa en obras maestras. Toca cada número para seguir el recorrido."
    },
    {
      obra: "1 · La Victoria de Samotracia",
      meta: "Anónimo griego · c. 190 a.C. · Sala 703 — Escalera Daru · Ala Denon",
      desc: "Llega aquí a primera hora, antes de que las multitudes corran hacia la Gioconda. Es la pieza más sobrecogedora del museo: Nike en la proa de un barco, con el viento en las alas."
    },
    {
      obra: "2 · La Gioconda",
      meta: "Leonardo da Vinci · c. 1503–1517 · Sala 711 · Ala Denon",
      desc: "La más famosa del mundo. Más pequeña de lo que se imagina, pero la sala entera orbita a su alrededor. Estrategia: llegar antes de las 10h o después de las 17h."
    },
    {
      obra: "3 · Las bodas de Caná",
      meta: "Paolo Veronese · 1563 · Sala 711 · Ala Denon",
      desc: "El cuadro más grande del Louvre: casi 10 metros de ancho. Robado por Napoleón en Venecia, nunca regresó. Está justo enfrente de la Gioconda y casi nadie lo mira."
    },
    {
      obra: "4 · La balsa de la Medusa",
      meta: "Théodore Géricault · 1819 · Sala 700 — Sala Mollien · Ala Denon",
      desc: "Casi 5×7 metros. Narra el naufragio de la fragata Méduse: 147 a la deriva, solo 15 sobrevivieron. Cima del Romanticismo francés y de la crítica política."
    },
    {
      obra: "5 · La Libertad guiando al pueblo",
      meta: "Eugène Delacroix · 1830 · Sala 700 — Sala Mollien · Ala Denon",
      desc: "Marianne sobre la barricada con la bandera tricolor. Pintada tras los Tres Días Gloriosos de julio de 1830. Misma sala que La balsa de la Medusa."
    },
    {
      obra: "6 · Venus de Milo",
      meta: "Anónimo griego · c. 130–100 a.C. · Sala 345 · Ala Sully",
      desc: "Cruzar el Cour Napoléon hacia Sully. Junto a la Victoria y la Gioconda, forma la trinidad del Louvre. Sus brazos ya faltaban cuando llegó al museo en 1821."
    },
    {
      obra: "7 · El escriba sentado",
      meta: "Anónimo egipcio · c. 2480–2350 a.C. · Sully Planta 0",
      desc: "Sus ojos de cristal de roca llevan 4.500 años mirando. Una de las piezas más inquietantes del museo. Pequeña, pero de una presencia que desconcierta."
    },
    {
      obra: "8 · Los esclavos",
      meta: "Miguel Ángel · 1513–1515 · Richelieu Planta 0",
      desc: "Subir a Richelieu. El Esclavo moribundo y el Esclavo rebelde, dos mármoles inacabados que Francisco I recibió de regalo. Las figuras emergen de la piedra sin terminar de liberarse."
    },
    {
      obra: "9 · La encajera",
      meta: "Johannes Vermeer · c. 1669–1670 · Sala 837 · Ala Richelieu",
      desc: "Una de las pinturas más pequeñas y perfectas del Louvre. La luz de Vermeer en estado puro: una joven concentrada en su labor, congelada para siempre. Fin del recorrido."
    }
  ];

  function activar(i) {
    document.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
    document.getElementById('p'+i).classList.add('active');
    const o = obras[i];
    document.getElementById('iObra').textContent = o.obra;
    document.getElementById('iMeta').textContent = o.meta;
    document.getElementById('iDesc').textContent = o.desc;
    document.getElementById('infoPanel').classList.add('vis');
  }
</script>
</body>
</html>
